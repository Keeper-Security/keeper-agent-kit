name: Test Skills Trigger

on:
  push:
    branches: [main, develop]
    paths:
      - "skills/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "skills/**"

jobs:
  test-skill-triggers:
    name: Verify Skill Trigger Patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install PyYAML (frontmatter validation)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-yaml

      - name: Extract and Test Skill Descriptions
        run: |
          python << 'EOF'
          import os
          import re
          import yaml

          # Map of skill names to trigger keywords they should recognize
          expected_triggers = {
            "keeper-secrets": [
              "keeper", "ksm", "secret", "vault", "credentials",
              "keeper://", "password", "api key", "certificate",
              "ci/cd", "docker", "kubernetes"
            ],
            "keeper-admin": [
              "keeper", "commander", "admin", "enterprise",
              "user management", "pam", "rotation", "session"
            ],
            "keeper-setup": [
              "install", "keeper", "setup", "configure",
              "ksm", "commander", "cli"
            ]
          }

          skills_dir = "skills"
          found_skills = {}

          for skill_name in os.listdir(skills_dir):
            skill_path = os.path.join(skills_dir, skill_name, "SKILL.md")
            if not os.path.exists(skill_path):
              continue

            with open(skill_path) as f:
              content = f.read()

            # Extract frontmatter
            match = re.match(r'^---\n(.*?)\n---', content, re.DOTALL)
            if not match:
              print(f"⚠ {skill_name}: No frontmatter")
              continue

            try:
              frontmatter = yaml.safe_load(match.group(1))
            except:
              print(f"⚠ {skill_name}: Invalid YAML")
              continue

            description = frontmatter.get("description", "")
            found_skills[skill_name] = description

            print(f"\n📋 Skill: {skill_name}")
            print(f"   Description length: {len(description)} chars")

            # Check for trigger keywords
            description_lower = description.lower()
            expected = expected_triggers.get(skill_name, [])
            found_triggers = []

            for trigger in expected:
              if trigger.lower() in description_lower:
                found_triggers.append(trigger)

            if found_triggers:
              print(f"   ✓ Found {len(found_triggers)}/{len(expected)} expected triggers")
            else:
              print(f"   ⚠ No expected triggers found in description")

          print(f"\n✓ Analyzed {len(found_skills)} skills")
          EOF

      - name: Verify Skill Content
        run: |
          python << 'EOF'
          import os

          skills_content_checks = {
            "keeper-secrets/SKILL.md": [
              "When to Use KSM",
              "Prerequisites",
              "Core Commands",
              "ksm exec",
              "ksm interpolate",
              "Guardrails"
            ],
            "keeper-admin/SKILL.md": [
              "When to Use Commander",
              "Prerequisites",
              "Vault Operations",
              "Enterprise Administration",
              "Guardrails"
            ],
            "keeper-setup/SKILL.md": [
              "Quick Install",
              "KSM CLI",
              "Commander",
              "Troubleshooting"
            ]
          }

          print("Checking skill content coverage...")
          errors = []

          for skill_path, expected_sections in skills_content_checks.items():
            full_path = f"skills/{skill_path}"
            if not os.path.exists(full_path):
              errors.append(f"Missing: {full_path}")
              continue

            with open(full_path) as f:
              content = f.read()

            skill_name = skill_path.split('/')[0]
            missing_sections = []

            for section in expected_sections:
              if section not in content:
                missing_sections.append(section)

            if missing_sections:
              print(f"⚠ {skill_name}: Missing sections: {', '.join(missing_sections)}")
            else:
              print(f"✓ {skill_name}: All expected sections present")

          if errors:
            print("\n❌ Content check failed:")
            for error in errors:
              print(f"  - {error}")
            exit(1)
          EOF

  validate-examples:
    name: Validate Code Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check Code Block Formatting
        run: |
          python << 'EOF'
          import os
          import re

          def check_markdown_file(filepath):
            with open(filepath) as f:
              content = f.read()

            # Find all code blocks
            code_blocks = re.findall(r'```(\w+)?\n(.*?)```', content, re.DOTALL)

            issues = []

            for lang, code in code_blocks:
              # Check for language specification
              if not lang:
                # Count newlines to identify problematic blocks
                if '\n' in code and code.strip():
                  issues.append("Code block without language specification")

              # Check for hardcoded secrets
              if re.search(r'password\s*=\s*["\'](?!<)(?!keeper)', code, re.IGNORECASE):
                issues.append("Possible hardcoded password in example")
              if re.search(r'token\s*=\s*["\'](?!<)(?!keeper)', code, re.IGNORECASE):
                issues.append("Possible hardcoded token in example")

            return issues

          print("Checking for insecure examples...")

          for root, dirs, files in os.walk("skills"):
            for file in files:
              if file.endswith(".md"):
                filepath = os.path.join(root, file)
                issues = check_markdown_file(filepath)

                if issues:
                  print(f"\n⚠ {filepath}:")
                  for issue in issues:
                    print(f"    - {issue}")
                else:
                  print(f"✓ {filepath}")
          EOF

  documentation-checks:
    name: Documentation Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check Documentation Completeness
        run: |
          python << 'EOF'
          import os

          required_docs = [
            ("README.md", ["Installation", "Prerequisites", "Documentation", "Contributing", "License", "Security"]),
            ("SECURITY.md", ["Reporting", "Supported versions"]),
            ("CONTRIBUTING.md", ["How to Contribute", "Testing Guidelines", "Submission Checklist"]),
            ("LICENSE.md", [])
          ]

          print("Checking documentation files...")

          for doc_file, expected_sections in required_docs:
            if not os.path.exists(doc_file):
              print(f"⚠ Missing: {doc_file}")
              continue

            with open(doc_file) as f:
              content = f.read()

            missing = []
            for section in expected_sections:
              if section not in content:
                missing.append(section)

            if missing:
              print(f"⚠ {doc_file}: Missing: {', '.join(missing)}")
            else:
              print(f"✓ {doc_file}")
          EOF

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-skill-triggers, validate-examples, documentation-checks]
    if: always()
    steps:
      - name: Results
        run: echo "✓ Skill testing complete"
