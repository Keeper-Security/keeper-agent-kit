default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: local
    hooks:
      # Commit message validation (Conventional Commits)
      - id: commit-msg
        name: Validate commit message format
        entry: scripts/validate-commit-msg.sh
        language: system
        pass_filenames: true
        stages: [commit-msg]

      # Markdown formatting
      - id: fmt
        name: rumdl fmt (check)
        stages: [pre-commit]
        language: system
        entry: task fmt
        pass_filenames: false

      # Plugin manifests (Claude/Cursor), marketplaces, skills, triggers, docs (scripts/validate.sh)
      - id: plugin-ci
        name: Plugin and skill validation
        stages: [pre-commit]
        language: system
        entry: task validate
        pass_filenames: false
        files: ^(plugins/|\.claude-plugin/|\.cursor-plugin/|scripts/validate\.sh|Taskfile\.yaml|README\.md|SECURITY\.md|CONTRIBUTING\.md|LICENSE\.md)

  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: check-json
      - id: check-yaml
      - id: check-toml
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
