name: Validate Plugin Configuration

on:
  push:
    branches: [main, develop]
    paths:
      - ".claude-plugin/**"
      - "skills/**"
      - ".github/workflows/validate-plugin.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - ".claude-plugin/**"
      - "skills/**"
      - ".github/workflows/validate-plugin.yml"

jobs:
  validate-plugin-json:
    name: Validate plugin.json Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate plugin.json
        run: |
          # Check file exists
          if [ ! -f ".claude-plugin/plugin.json" ]; then
            echo "ERROR: .claude-plugin/plugin.json not found"
            exit 1
          fi

          # Validate JSON syntax
          if ! python -m json.tool .claude-plugin/plugin.json > /dev/null; then
            echo "ERROR: Invalid JSON in plugin.json"
            exit 1
          fi

          echo "✓ plugin.json is valid JSON"

      - name: Check Required Fields
        run: |
          python << 'EOF'
          import json

          with open(".claude-plugin/plugin.json") as f:
            data = json.load(f)

          required = ["name", "description", "version", "author", "keywords", "category"]
          for field in required:
            if field not in data:
              print(f"ERROR: Missing required field '{field}'")
              exit(1)
            print(f"✓ {field}: {data[field]}")

          if not isinstance(data.get("keywords"), list):
            print("ERROR: 'keywords' must be an array")
            exit(1)

          print("✓ All required fields present and valid")
          EOF

  validate-marketplace-json:
    name: Validate marketplace.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate marketplace.json
        run: |
          if [ -f ".claude-plugin/marketplace.json" ]; then
            if ! python -m json.tool .claude-plugin/marketplace.json > /dev/null; then
              echo "ERROR: Invalid JSON in marketplace.json"
              exit 1
            fi
            echo "✓ marketplace.json is valid JSON"
          else
            echo "⚠ marketplace.json not found (optional for self-hosted)"
          fi

      - name: Check Marketplace Structure
        run: |
          python << 'EOF'
          import json
          import os

          if not os.path.exists(".claude-plugin/marketplace.json"):
            print("marketplace.json not present - skipping")
            exit(0)

          with open(".claude-plugin/marketplace.json") as f:
            data = json.load(f)

          if "plugins" not in data:
            print("ERROR: Missing 'plugins' array in marketplace.json")
            exit(1)

          for plugin in data["plugins"]:
            required = ["id", "name", "description", "version"]
            for field in required:
              if field not in plugin:
                print(f"ERROR: Plugin missing '{field}'")
                exit(1)

          print(f"✓ marketplace.json contains {len(data['plugins'])} plugins")
          for plugin in data["plugins"]:
            print(f"  - {plugin['name']} v{plugin['version']}")
          EOF

  validate-skill-files:
    name: Validate SKILL.md Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install PyYAML (frontmatter validation)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-yaml

      - name: Find All SKILL.md Files
        run: |
          echo "Found SKILL.md files:"
          find skills -name "SKILL.md" -type f | while read file; do
            echo "  - $file"
          done

      - name: Validate Frontmatter
        run: |
          python << 'EOF'
          import os
          import re
          import yaml

          skill_files = []
          for root, dirs, files in os.walk("skills"):
            for file in files:
              if file == "SKILL.md":
                skill_files.append(os.path.join(root, file))

          if not skill_files:
            print("ERROR: No SKILL.md files found")
            exit(1)

          errors = []

          for filepath in skill_files:
            print(f"\nValidating {filepath}")

            with open(filepath, 'r') as f:
              content = f.read()

            # Check for frontmatter
            if not content.startswith('---'):
              errors.append(f"{filepath}: Missing frontmatter")
              continue

            # Extract frontmatter
            match = re.match(r'^---\n(.*?)\n---\n', content, re.DOTALL)
            if not match:
              errors.append(f"{filepath}: Invalid frontmatter syntax")
              continue

            try:
              frontmatter = yaml.safe_load(match.group(1))
            except yaml.YAMLError as e:
              errors.append(f"{filepath}: Invalid YAML frontmatter: {e}")
              continue

            # Validate required fields
            if "name" not in frontmatter:
              errors.append(f"{filepath}: Missing 'name' field")
            elif not isinstance(frontmatter["name"], str):
              errors.append(f"{filepath}: 'name' must be a string")
            elif len(frontmatter["name"]) > 64:
              errors.append(f"{filepath}: 'name' must be ≤64 characters")
            else:
              print(f"  ✓ name: {frontmatter['name']}")

            if "description" not in frontmatter:
              errors.append(f"{filepath}: Missing 'description' field")
            elif not isinstance(frontmatter["description"], str):
              errors.append(f"{filepath}: 'description' must be a string")
            else:
              # Warn if too long for API but don't fail
              if len(frontmatter["description"]) > 200:
                print(f"  ⚠ description is {len(frontmatter['description'])} chars (200+ may be truncated in some APIs)")
              print(f"  ✓ description: {frontmatter['description'][:50]}...")

            # Check for content after frontmatter
            content_after = content[match.end():].strip()
            if not content_after:
              errors.append(f"{filepath}: No content after frontmatter")
            else:
              print(f"  ✓ Has {len(content_after.split())} words of content")

          if errors:
            print("\n❌ ERRORS FOUND:")
            for error in errors:
              print(f"  - {error}")
            exit(1)
          else:
            print("\n✓ All SKILL.md files are valid")
          EOF

      - name: Check Markdown Syntax
        run: |
          python << 'EOF'
          import os
          import re

          skill_files = []
          for root, dirs, files in os.walk("skills"):
            for file in files:
              if file == "SKILL.md":
                skill_files.append(os.path.join(root, file))

          errors = []

          for filepath in skill_files:
            with open(filepath, 'r') as f:
              lines = f.readlines()

            in_frontmatter = False
            frontmatter_count = 0
            last_heading_level = 0
            in_code_block = False
            code_language = None

            for i, line in enumerate(lines, 1):
              # Track frontmatter
              if line.strip() == '---':
                frontmatter_count += 1
                if frontmatter_count == 2:
                  in_frontmatter = False
                continue

              if in_frontmatter:
                continue

              # Track code blocks
              if line.startswith('```'):
                if not in_code_block:
                  match = re.match(r'^```(\w+)?', line)
                  code_language = match.group(1) if match else None
                  if not code_language:
                    errors.append(f"{filepath}:{i}: Code block missing language specification")
                in_code_block = not in_code_block

              # Check heading hierarchy
              if line.startswith('##'):
                match = re.match(r'^(#+)', line)
                if match:
                  level = len(match.group(1))
                  if level > last_heading_level + 1:
                    errors.append(f"{filepath}:{i}: Heading jumps from H{last_heading_level} to H{level}")
                  last_heading_level = level

          if errors:
            print("❌ Markdown issues found:")
            for error in errors:
              print(f"  - {error}")
            # Don't fail - these are warnings
            print("\n⚠ Fix these issues for better readability")
          else:
            print("✓ Markdown syntax looks good")
          EOF

  check-references:
    name: Validate Reference Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check Reference Files Exist
        run: |
          echo "Checking for reference documentation files..."

          required_refs=(
            "skills/keeper-secrets/references/ksm-commands.md"
            "skills/keeper-secrets/references/keeper-notation.md"
            "skills/keeper-secrets/references/ksm-exec-patterns.md"
            "skills/keeper-admin/references/commander-commands.md"
            "skills/keeper-admin/references/enterprise-mgmt.md"
            "skills/keeper-admin/references/pam-commands.md"
            "skills/keeper-admin/references/rotation-commands.md"
          )

          missing=()
          for ref in "${required_refs[@]}"; do
            if [ ! -f "$ref" ]; then
              missing+=("$ref")
            else
              echo "  ✓ $ref"
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo ""
            echo "❌ Missing reference files:"
            for ref in "${missing[@]}"; do
              echo "  - $ref"
            done
            exit 1
          fi

          echo ""
          echo "✓ All reference files present"

      - name: Check Reference Content
        run: |
          python << 'EOF'
          import os

          refs = {
            "skills/keeper-secrets/references/ksm-commands.md": 50,
            "skills/keeper-secrets/references/keeper-notation.md": 40,
            "skills/keeper-secrets/references/ksm-exec-patterns.md": 60,
            "skills/keeper-admin/references/commander-commands.md": 50,
            "skills/keeper-admin/references/enterprise-mgmt.md": 40,
            "skills/keeper-admin/references/pam-commands.md": 40,
            "skills/keeper-admin/references/rotation-commands.md": 40,
          }

          for filepath, min_lines in refs.items():
            if not os.path.exists(filepath):
              print(f"⚠ {filepath} not found (skipping)")
              continue

            with open(filepath) as f:
              content = f.read()
              lines = content.count('\n')

            if lines < min_lines:
              print(f"⚠ {filepath}: {lines} lines (expected ≥{min_lines})")
            else:
              print(f"✓ {filepath}: {lines} lines")
          EOF

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs:
      [
        validate-plugin-json,
        validate-marketplace-json,
        validate-skill-files,
        check-references,
      ]
    if: always()
    steps:
      - name: Check Results
        run: |
          if [ "${{ needs.validate-plugin-json.result }}" = "failure" ] || \
             [ "${{ needs.validate-skill-files.result }}" = "failure" ] || \
             [ "${{ needs.check-references.result }}" = "failure" ]; then
            echo "❌ Validation failed"
            exit 1
          fi
          echo "✓ All validations passed"
